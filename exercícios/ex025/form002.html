<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Teste de Formulário</h1>
    <form action="cadastro.php" method="POST">
        <p>
            <label for="iusu">Usuário:</label>
            <input type="text" name="usu" id="iusu" required minlength="5" maxlength="15" size="10" placeholder="nome do usuário" autocomplete="username"> <!-- min length = minimo de letras do usuário, maxlength = máximo de letras do usuário-->
        </p>
        <p>
            <label for="isen">Senha:</label>
            <input type="password" name="sen" id="isen" minlength="8" maxlength="18" size="10" placeholder="mínimo 8 letras" autocomplete="current-password"> <!-- min length / max length = mínimo e máximo de caracteres.-->
                     <!-- size = tamanho da caixa / placeholder = ele da dicas para o usuário preencher -->
        </p>
        <p> <!-- botões de enviar e limpar no formulário -->
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>
    </form>
</body>
</html>
